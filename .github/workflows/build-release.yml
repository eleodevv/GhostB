name: Build & Release GhostB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Disable analytics
        continue-on-error: true
        run: flutter config --no-analytics
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev dpkg-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package deb
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          BUNDLE="build/linux/x64/release/bundle"
          mkdir -p deb/DEBIAN deb/opt/ghostb deb/usr/local/bin deb/usr/share/applications deb/usr/share/icons/hicolor/256x256/apps
          cp -r "$BUNDLE/"* deb/opt/ghostb/
          cp assets/images/ghostb.png deb/usr/share/icons/hicolor/256x256/apps/ghostb.png
          printf '#!/bin/bash\ncd /opt/ghostb\nexec ./ghostb "$@"\n' > deb/usr/local/bin/ghostb
          chmod +x deb/usr/local/bin/ghostb
          printf '[Desktop Entry]\nName=GhostB\nComment=Eliminador universal de apps\nExec=/usr/local/bin/ghostb\nIcon=ghostb\nTerminal=false\nType=Application\nCategories=Utility;System;\n' > deb/usr/share/applications/ghostb.desktop
          printf "Package: ghostb\nVersion: ${VERSION}\nArchitecture: amd64\nMaintainer: eleodevv\nDescription: GhostB - Universal Smart App Remover\nDepends: libgtk-3-0\n" > deb/DEBIAN/control
          dpkg-deb --build deb "ghostb_${VERSION}_amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: "*.deb"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Disable analytics
        continue-on-error: true
        run: flutter config --no-analytics
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then echo "No .app found"; exit 1; fi
          codesign --force --deep --sign - "$APP_PATH"
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "GhostB" -srcfolder dmg_staging -ov -format UDZO "GhostB-${VERSION}.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: "*.dmg"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Disable analytics
        continue-on-error: true
        run: flutter config --no-analytics
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name || github.event.inputs.version }}" -replace '^v', ''
          $dir = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$dir\*" -DestinationPath "GhostB-${VERSION}-windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: "*.zip"

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GhostB ${{ github.ref_name }}"
          body: |
            ## 👻 GhostB ${{ github.ref_name }}

            | Plataforma | Archivo |
            |---|---|
            | 🐧 Linux | `ghostb_*_amd64.deb` |
            | 🍎 macOS | `GhostB-*.dmg` |
            | 🪟 Windows | `GhostB-*-windows.zip` |

            **Linux:** `sudo dpkg -i ghostb_*.deb`
            **macOS:** Abrir .dmg y arrastrar a Aplicaciones
            **Windows:** Extraer .zip y ejecutar ghostb.exe
          files: |
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
